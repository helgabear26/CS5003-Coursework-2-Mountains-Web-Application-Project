<!DOCTYPE html>
<html
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
        xmlns="http://www.w3.org/1999/xhtml">
<h:head>
    <meta charset="UTF-8" />
    <title>Login Page</title>
    <link rel="stylesheet" type="text/css" href="../css/login.css" />
    <script type="text/javascript" src="../js/script.js"></script>
</h:head>
<h:body>
    <div class="content">
        <div class="login-box">
            <h1>Have an account?</h1>
            <div class="header-text">Login into your account</div>

            <h:form id="loginForm">

                <h:messages globalOnly="true"
                            showSummary="false"
                            showDetail="true"
                            layout="list"
                            styleClass="general-error"
                />

                <!-- ✅ CHANGED HERE -->
                <div class="input-box">
                    <h:inputText id="username"
                                 value="#{loginBean.username}"
                                 styleClass="input-field"
                                 pt:placeholder="Username" />
                    <h:message for="username" styleClass="error-message" />
                </div>

                <div class="input-box">
                    <h:inputSecret id="password"
                                   value="#{loginBean.password}"
                                   styleClass="input-field"
                                   pt:placeholder="Password" />
                    <span class="hide-password" onclick="hidepassword()"></span>
                    <h:message for="password" styleClass="error-message" />
                </div>

                <h:commandButton value="Login"
                                 action="#{loginBean.login}"
                                 styleClass="button" />

                <h3>Don't have an account? Click sign up</h3>
                <a href="">Sign up</a>

            </h:form>
        </div>
    </div>
</h:body>
</html>
