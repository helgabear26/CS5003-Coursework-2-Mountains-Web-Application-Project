<!DOCTYPE html>
<html xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f ="http://xmlns.jcp.org/jsf/core"
      xmlns="http://www.w3.org/1999/xhtml">

<h:head>
    <meta charset="UTF-8"/>
    <title>Booking Page</title>
    <link rel="stylesheet" type="text/css" href="../css/layout.css"/>
    <h:outputStylesheet library="css" name="style.css"/>
</h:head>

<body>
<div class="topbar">
    <a href="http://localhost:8080/CS5003Coursework2MountainsWebApplicationProject-1.0-SNAPSHOT/pages/dynamic/homePage.xhtml" class="logo-container">
        <h:graphicImage library="images" name="Mountain website logo 2.png" styleClass="logo"/>
        <span class="logo-text">Mountains</span>
    </a>
    <h:form styleClass="topbar-right">
        <h:panelGroup rendered="#{empty loginBean.loggedInUser}">
            <h:link outcome="/pages/dynamic/login.xhtml"
                    styleClass="login-icon">
                <h:graphicImage library="images"
                                name="Login.png"
                                styleClass="login-img"/>
                <span class="login-text">log in</span>
            </h:link>
        </h:panelGroup>
        <h:panelGroup rendered="#{not empty loginBean.loggedInUser}">
            <h:outputText value="#{loginBean.loggedInUser.username}"
                          styleClass ="login-text"/>
            <h:commandLink value="Logout"
                           action="#{loginBean.logout}"
                           styleClass="logout-link"/>
        </h:panelGroup>

    </h:form>
</div>


<div class="layout">
    <div class ="sidebar">
        <h2>MENU</h2>
        <a href ="../static/aboutUs.xhtml">AboutUs</a>
        <a href ="../static/safetyGuide.xhtml">Safety Guide</a>
        <a href="../dynamic/mountains.xhtml">view mountains</a>
        <a href="../dynamic/myProfile.xhtml">My Profile</a>
        <a href="../dynamic/homePage.xhtml">Home</a>
        <a href="../dynamic/weather.xhtml/">weather</a>
        <a href="../dynamic/bookmarks.xhtml">BookMarks</a>
    </div>
    <div class="content">
        <div class ="content-box">
            <h1>My Bookings</h1>
            <h:form>
                <h:messages  globalOnly="true"/>
                <h:dataTable value="#{bookingBean.userBookings}" var="B" border="1">
                    <h:column>
                        <f:facet name="header">Booking ID</f:facet>
                        #{B.id}
                    </h:column>

                    <h:column>
                        <f:facet name="header">Accommodation</f:facet>
                        #{B.accommodationID.name}
                    </h:column>

                    <h:column>
                        <f:facet name="header">DATE</f:facet>
                        #{B.datesBooked}
                    </h:column>

                    <h:column>
                        <f:facet name="header">Email</f:facet>
                        #{B.email}
                    </h:column>

                    <h:column>
                        <f:facet name="header">Phone</f:facet>
                        #{B.phoneNo}
                    </h:column>

                    <h:column>
                        <f:facet name="header">Actions</f:facet>
                        <h:commandButton value="Edit"
                                         action="#{bookingBean.selectBookingtoEdit(B)}"/>


                        <h:commandButton  value="Delete"
                                          action="#{bookingBean.deleteBooking(B.id)}"
                                          onclick="return confirm('you are about to delete this booking');"/>

                    </h:column>


                </h:dataTable>
            </h:form>
            <h:panelGroup id="editPanel" layout="block" rendered="#{not empty bookingBean.selectedBooking}">
                <h2> Edit Booking</h2>

                <h:form>
                    <h:messages globalOnly="false"/>
                    <h:panelGrid columns="2">
                        <h:outputText value="Accommodation:"/>
                        <h:outputText value="#{bookingBean.selectedBooking.accommodationID.name}"/>

                        <h:outputText value="Date:"/>
                        <h:inputText value="#{bookingBean.selectedBooking.datesBooked}">
                            <f:convertDateTime pattern="yyyy-MM-dd" type="localDate"/>
                        </h:inputText>

                        <h:outputText value="Email:"/>
                        <h:inputText value="#{bookingBean.selectedBooking.email}"/>

                        <h:outputText value="Phone:"/>
                        <h:inputText value="#{bookingBean.selectedBooking.phoneNo}"/>

                    </h:panelGrid>
                    <h:commandButton value="Update Booking"
                                     action="#{bookingBean.updateBooking}"/>

                </h:form>

            </h:panelGroup>
        </div>
    </div>

</div>


</body>


</html>
