<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <!-- Basic page setup -->
    <meta charset="UTF-8"/>
    <title>Mountain Home Page</title>

    <!-- Linking homepage stylesheet -->
    <link rel="stylesheet" type="text/css" href="../css/Homepage.css"/>
</h:head>

<h:body>

    <!-- Top navigation bar -->
    <div class="top-navbar">

        <!-- Logo and website name -->
        <a href="../dynamic/homePage.xhtml" class="logo-container">
            <h:graphicImage library="images"
                            name="Mountain website logo 2.png"
                            styleClass="logo"/>
            <span class="logo-text">Mountains</span>
        </a>

        <!-- Navigation links -->
        <ul class="nav-links">

            <!-- Static navigation links -->
            <li><a href="../static/aboutUs.xhtml">About Us</a></li>
            <li><a href="../static/safetyGuide.xhtml">Safety Guide</a></li>

            <!-- Shown when user is not logged in -->
            <ui:fragment rendered="#{empty loginBean.loggedInUser}">
                <li>
                    <h:link outcome="/pages/dynamic/login.xhtml" value="Login"/>
                </li>
            </ui:fragment>

            <!-- Shown when user is logged in -->
            <ui:fragment rendered="#{not empty loginBean.loggedInUser}">

                <!-- Display welcome message -->
                <li>
                    <h:outputText value="Welcome, #{homeBean.username}"
                                  style="color:white; padding:10px 14px; display:block;"/>
                </li>

                <!-- Logout option -->
                <li>
                    <h:form style="display:inline; margin:0;">
                        <h:commandLink value="Log out?"
                                       action="#{homeBean.logout}"
                                       style="color:white; padding:10px 14px; display:block;"/>
                    </h:form>
                </li>
            </ui:fragment>

            <!-- Dropdown menu for additional features -->
            <li class="dropdown">
                <a href="#">Menu &#9662;</a>

                <ul class="dropdown-menu">

                    <!-- View mountains option -->
                    <li>
                        <h:form style="display:inline; margin:0;">
                            <h:commandLink value="View Mountains"
                                           action="#{homeBean.viewMountain}"
                                           style="color:white; padding:12px 16px; display:block;"/>
                        </h:form>
                    </li>

                    <!-- Weather page option -->
                    <li>
                        <h:form style="display:inline; margin:0;">
                            <h:commandLink value="Weather"
                                           action="#{homeBean.viewWeather}"
                                           style="color:white; padding:12px 16px; display:block;"/>
                        </h:form>
                    </li>

                    <!-- Bookings page option -->
                    <li>
                        <h:form style="display:inline; margin:0;">
                            <h:commandLink value="My Bookings"
                                           action="#{homeBean.viewBookings}"
                                           style="color:white; padding:12px 16px; display:block;"/>
                        </h:form>
                    </li>

                    <!-- Profile page option -->
                    <li>
                        <h:form style="display:inline; margin:0;">
                            <h:commandLink value="My Profile"
                                           action="#{homeBean.viewProfile}"
                                           style="color:white; padding:12px 16px; display:block;"/>
                        </h:form>
                    </li>

                </ul>
            </li>
        </ul>
    </div>

    <!-- Main centered content -->
    <div class="center-content">

        <!-- Welcome message -->
        <h1>Welcome to our Website</h1>

        <!-- Subheading -->
        <p>Your journey starts here</p>

    </div>

</h:body>
</html>
