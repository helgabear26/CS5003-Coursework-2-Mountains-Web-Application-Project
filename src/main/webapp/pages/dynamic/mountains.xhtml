<!DOCTYPE html>
<html xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns="http://www.w3.org/1999/xhtml">

<h:head>
    <!-- Basic page setup -->
    <meta charset="UTF-8"/>
    <title>mountains Page</title>

    <!-- Linking main stylesheet -->
    <h:outputStylesheet library="css" name="style.css"/>

    <!-- Additional layout styling -->
    <link rel="stylesheet" type="text/css" href="../css/layout.css"/>
</h:head>

<body>

<!-- Top navigation bar -->
<div class="topbar">
    <a href="../dynamic/homePage.xhtml" class="logo-container">

        <!-- Website logo -->
        <h:graphicImage library="images" name="Mountain website logo 2.png" styleClass="logo"/>

        <!-- Website name -->
        <span class="logo-text">Mountains</span>
    </a>

    <!-- Login / user section -->
    <h:form styleClass="topbar-right">

        <!-- Shown when user is not logged in -->
        <h:panelGroup rendered="#{empty loginBean.loggedInUser}">
            <h:link outcome="/pages/dynamic/login.xhtml" styleClass="login-icon">

                <!-- Login icon -->
                <h:graphicImage library="images" name="Login.png" styleClass="login-img"/>

                <!-- Login text -->
                <span class="login-text">log in</span>
            </h:link>
        </h:panelGroup>

        <!-- Shown when user is logged in -->
        <h:panelGroup rendered="#{not empty loginBean.loggedInUser}">

            <!-- Display username -->
            <h:outputText value="#{loginBean.loggedInUser.username}" styleClass ="login-text"/>

            <!-- Logout button -->
            <h:commandLink value="Logout" action="#{loginBean.logout}" styleClass="logout-link"/>
        </h:panelGroup>

    </h:form>
</div>

<!-- Main layout container -->
<div class="layout">

    <!-- Sidebar navigation -->
    <div class ="sidebar">
        <h2>Menu</h2>

        <a href= "../dynamic/homePage.xhtml">Home</a>
        <a href="../static/aboutUs.xhtml">About Us</a>
        <a href="../static/safetyGuide.xhtml">Safety Guide</a>
        <a href="#" class="active">View mountains</a>

        <!-- Profile navigation -->
        <h:form style="display:inline; margin:0;">
            <h:commandLink value="My Profile"
                           action="#{homeBean.viewProfile}"
                           style="color:white; padding:12px 16px; display:block;"/>
        </h:form>

        <a href="../dynamic/weather.xhtml">Weather</a>

        <!-- Bookings navigation -->
        <h:form style="display:inline; margin:0;">
            <h:commandLink value="My Bookings"
                           action="#{homeBean.viewBookings}"
                           style="color:white; padding:12px 16px; display:block;"/>
        </h:form>


    </div>

    <!-- Main content section -->
    <div class="content">
        <div class="content-box">

            <!-- Page heading -->
            <h1>Mountains information</h1>

            <!-- Form containing data table -->
            <h:form>

                <!-- Table displaying list of mountains -->
                <h:dataTable value="#{mountainListBean.mountains}" var="m">

                    <!-- Mountain name column -->
                    <h:column>
                        <f:facet name ="header">Name</f:facet>
                        #{m.name}
                    </h:column>

                    <!-- Region column -->
                    <h:column>
                        <f:facet name="header">Region</f:facet>
                        #{m.countryRegion}
                    </h:column>

                    <!-- Elevation column -->
                    <h:column>
                        <f:facet name ="header">Elevation</f:facet>
                        #{m.elevation}
                    </h:column>

                    <!-- Actions column -->
                    <h:column>
                        <f:facet name ="header">Actions</f:facet>

                        <!-- Button to select a mountain -->
                        <h:commandButton value ="Select Mountain"
                                         action="#{mountainListBean.selectMountain(m)}"
                                         styleClass="button"/>
                    </h:column>

                </h:dataTable>
            </h:form>
        </div>
    </div>
</div>

<!-- Empty fragment (can be used for future additions if needed) -->
<ui:fragment>
</ui:fragment>

</body>
</html>
